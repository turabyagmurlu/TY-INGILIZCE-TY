<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dil Öğreniyorum</title>
<style>
  :root{
    --bg:#F7F4EF; --primary:#4F7CAC; --primary-dark:#3c5f87;
    --accent:#F2C14E; --accent-dark:#d9a52f; --text:#222222; --card:#ffffff;
    --good:#2e9e5b; --good-bg:#e7f6ec; --bad:#d9534f; --bad-bg:#fbe9e8;
    --muted:#6b6b6b; --line:#ece6dc; --shadow:0 6px 18px rgba(60,50,30,.10);
    --radius:18px; --fs:19px;
    --l1:#4F7CAC; --l2:#2e9e5b; --l3:#9b59b6;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:"Segoe UI",-apple-system,Roboto,"Helvetica Neue",Arial,sans-serif;
    background:var(--bg);color:var(--text);font-size:var(--fs);line-height:1.55;-webkit-text-size-adjust:100%;}
  .wrap{max-width:720px;margin:0 auto;padding:14px 16px 80px;}
  header.top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px;
    position:sticky;top:0;background:var(--bg);z-index:20;padding:8px 0;border-bottom:1px solid var(--line);}
  header.top h1{font-size:20px;margin:0;color:var(--primary-dark);white-space:nowrap;}
  .top-actions{display:flex;gap:8px;}
  .icon-btn{background:#fff;border:2px solid var(--line);color:var(--primary-dark);border-radius:12px;
    padding:8px 12px;font-size:16px;cursor:pointer;font-weight:600;}
  .icon-btn:hover{border-color:var(--primary);}
  .hidden{display:none !important;}

  .card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px;}
  h2{font-size:25px;margin:0 0 12px;color:var(--primary-dark);}
  h3{font-size:20px;margin:0 0 8px;}
  p{margin:0 0 12px;}
  .muted{color:var(--muted);font-size:.88em;}
  .center{text-align:center;}

  .btn{display:flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:14px;
    padding:16px 20px;font-size:20px;font-weight:700;cursor:pointer;width:100%;margin-top:8px;transition:transform .06s ease, filter .15s;}
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-accent{background:var(--accent);color:#3a2e00;}
  .btn-accent:hover{background:var(--accent-dark);}
  .btn-soft{background:#eef2f6;color:var(--primary-dark);}
  .btn-soft:hover{background:#e2e9f0;}
  .btn-ghost{background:transparent;border:2px solid var(--line);color:var(--primary-dark);}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;}
  .btn-row .btn{flex:1;min-width:130px;}

  .stats{display:flex;gap:10px;flex-wrap:wrap;}
  .stat{flex:1;min-width:84px;background:#fff;border-radius:14px;padding:14px;text-align:center;box-shadow:var(--shadow);}
  .stat .num{font-size:28px;font-weight:800;color:var(--primary);}
  .stat .lbl{font-size:13px;color:var(--muted);}
  .streak-badge{background:var(--accent);color:#3a2e00;border-radius:12px;padding:10px 16px;display:inline-block;font-weight:800;font-size:18px;}

  .week{display:flex;gap:6px;justify-content:space-between;margin-top:6px;}
  .day{flex:1;text-align:center;}
  .day .dot{width:38px;height:38px;border-radius:50%;margin:4px auto 2px;display:flex;align-items:center;justify-content:center;background:#eef2f6;color:var(--muted);font-size:18px;font-weight:700;}
  .day .dot.on{background:var(--good);color:#fff;}
  .day .dot.today{outline:3px solid var(--accent);}
  .day .lbl{font-size:12px;color:var(--muted);}

  /* level card */
  .level-card{border-radius:var(--radius);padding:18px;margin-bottom:16px;box-shadow:var(--shadow);background:#fff;border-top:6px solid var(--primary);}
  .level-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .level-head .lv-title{font-size:21px;font-weight:800;color:var(--primary-dark);}
  .cefr{font-size:13px;font-weight:800;color:#fff;background:var(--primary);border-radius:999px;padding:3px 10px;}
  .lv-prog{font-size:14px;color:var(--muted);margin-left:auto;}
  .locked-note{background:#fff7e6;border:1px solid var(--accent);border-radius:12px;padding:10px 12px;margin-top:10px;font-size:15px;color:#7a5a00;}

  .unit-list{list-style:none;padding:0;margin:10px 0 0;}
  .unit-item{display:flex;align-items:center;gap:12px;background:#fbf9f5;border-radius:14px;padding:12px 14px;margin-bottom:9px;cursor:pointer;border:2px solid transparent;}
  .unit-item:hover{border-color:var(--primary);}
  .unit-ico{font-size:24px;flex:0 0 auto;width:38px;text-align:center;}
  .unit-meta{flex:1;}
  .unit-meta .t{font-weight:700;font-size:17px;}
  .type-tag{font-size:12px;font-weight:700;border-radius:999px;padding:2px 8px;margin-right:6px;}
  .type-tag.g{background:#efe6f7;color:#6f3fa0;}
  .type-tag.v{background:#e6eef7;color:#34618c;}
  .badge-score{font-size:12px;background:var(--good-bg);color:#1d7a42;border-radius:999px;padding:2px 8px;font-weight:700;}
  .check{width:32px;height:32px;border-radius:50%;flex:0 0 32px;display:flex;align-items:center;justify-content:center;background:#eef2f6;color:var(--muted);font-size:16px;font-weight:700;}
  .check.done{background:var(--good);color:#fff;}

  /* grammar */
  .gtable{width:100%;border-collapse:collapse;margin:6px 0 12px;font-size:17px;}
  .gtable th,.gtable td{border:1px solid var(--line);padding:9px 10px;text-align:left;}
  .gtable th{background:#eef2f6;color:var(--primary-dark);}
  .rule-box{background:#f3f7fb;border-left:5px solid var(--primary);border-radius:10px;padding:12px 14px;margin:8px 0 12px;font-size:17px;}
  .ex-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
  .ex-row:last-child{border-bottom:none;}
  .ex-main{flex:1;}
  .ex-en{font-weight:700;font-size:18px;}
  .ex-tr{color:var(--primary-dark);font-size:15px;}

  /* word rows */
  .word-row{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--line);}
  .word-row:last-child{border-bottom:none;}
  .word-main{flex:1;}
  .word-en{font-size:21px;font-weight:700;}
  .word-tr{font-size:17px;color:var(--primary-dark);}
  .word-ex{font-size:15px;color:var(--muted);margin-top:2px;}
  .speak{flex:0 0 auto;width:56px;height:56px;border-radius:50%;border:none;background:var(--accent);font-size:24px;cursor:pointer;}
  .speak:active{transform:scale(.94);}
  .speak.sm{width:46px;height:46px;font-size:20px;}

  /* flashcard */
  .flash{perspective:1200px;margin:10px 0 4px;}
  .flash-inner{position:relative;width:100%;min-height:220px;cursor:pointer;transition:transform .55s;transform-style:preserve-3d;}
  .flash.flipped .flash-inner{transform:rotateY(180deg);}
  .flash-face{position:absolute;inset:0;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:var(--radius);padding:20px;text-align:center;}
  .flash-front{background:var(--primary);color:#fff;}
  .flash-back{background:var(--accent);color:#3a2e00;transform:rotateY(180deg);}
  .flash-face .big{font-size:34px;font-weight:800;}
  .flash-face .sub{font-size:17px;margin-top:12px;opacity:.96;}
  .flash-hint{text-align:center;color:var(--muted);font-size:15px;margin:8px 0 12px;}
  .counter{text-align:center;color:var(--muted);font-size:16px;margin-bottom:8px;}

  /* quiz */
  .opt{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:#fff;border:2px solid #dfe5ec;border-radius:14px;padding:15px 16px;font-size:19px;margin-bottom:11px;cursor:pointer;}
  .opt:hover{border-color:var(--primary);}
  .opt.correct{background:var(--good-bg);border-color:var(--good);}
  .opt.wrong{background:var(--bad-bg);border-color:var(--bad);}
  .opt:disabled{cursor:default;}
  .feedback{border-radius:14px;padding:14px;margin-top:6px;font-size:17px;}
  .feedback.good{background:var(--good-bg);color:#1d7a42;}
  .feedback.bad{background:var(--bad-bg);color:#a8312d;}
  .progressbar{background:#e7e1d7;border-radius:999px;height:14px;overflow:hidden;margin:10px 0;}
  .progressbar > span{display:block;height:100%;background:var(--accent);width:0;transition:width .35s;}

  .empty{color:var(--muted);text-align:center;padding:22px 0;}
  .review-item{display:flex;align-items:center;gap:10px;background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow);}

  .badges{display:flex;flex-wrap:wrap;gap:10px;}
  .badge{flex:1 1 140px;background:#fff;border-radius:14px;padding:14px;text-align:center;box-shadow:var(--shadow);opacity:.45;filter:grayscale(1);}
  .badge.on{opacity:1;filter:none;border:2px solid var(--accent);}
  .badge .b-ico{font-size:34px;}
  .badge .b-name{font-weight:700;font-size:15px;margin-top:4px;}
  .badge .b-desc{font-size:13px;color:var(--muted);}

  .seg{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 14px;}
  .seg button{flex:1;min-width:90px;background:#fff;border:2px solid var(--line);border-radius:12px;padding:12px;font-size:16px;cursor:pointer;font-weight:600;}
  .seg button.active{background:var(--primary);color:#fff;border-color:var(--primary);}
  label.set-lbl{font-weight:700;display:block;margin-top:8px;}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--primary-dark);color:#fff;padding:14px 20px;border-radius:14px;box-shadow:var(--shadow);font-size:17px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:60;max-width:92%;text-align:center;}
  .toast.show{opacity:1;}
  .mic-state{border-radius:14px;padding:14px;margin-top:8px;font-size:17px;background:#eef2f6;color:var(--primary-dark);}
  .mic-state.listening{background:#fff4d6;color:#7a5a00;}
  .pulse{animation:pulse 1s infinite;}
  @keyframes pulse{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}
  .confetti{position:fixed;top:-12px;width:10px;height:16px;z-index:70;border-radius:2px;pointer-events:none;}
  .tip{background:#fff8e6;border:1px solid var(--accent);border-radius:12px;padding:12px 14px;margin:12px 0 4px;font-size:16px;color:#6b5300;}
  .tip b{color:#7a5a00;}
  .goal{background:#eef5ff;border-left:5px solid var(--primary);border-radius:10px;padding:10px 14px;margin:6px 0;font-size:16px;}
  .stepper{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;}
  .step{flex:1;min-width:64px;background:#eef2f6;border-radius:12px;padding:8px 4px;text-align:center;font-size:13px;color:var(--primary-dark);font-weight:700;}
  .step .n{display:inline-flex;width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;align-items:center;justify-content:center;font-size:13px;margin-bottom:3px;}
  .ezber{background:#f5f9fc;border:2px dashed var(--primary);border-radius:14px;padding:14px;margin-bottom:11px;}
  .ezber .ez-top{display:flex;align-items:center;gap:10px;}
  .ezber .en{font-size:23px;font-weight:800;flex:1;}
  .reveal-btn{background:var(--primary);color:#fff;border:none;border-radius:10px;padding:10px 14px;font-size:15px;cursor:pointer;font-weight:700;white-space:nowrap;}
  .reveal-btn:active{transform:scale(.97);}
  .reveal-box{margin-top:10px;}
  footer{text-align:center;color:var(--muted);font-size:14px;margin-top:24px;}
  @media (max-width:480px){ header.top h1{font-size:17px;} .flash-face .big{font-size:30px;} .icon-btn{padding:8px 10px;font-size:15px;} }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>📘 Dil Öğreniyorum</h1>
    <div class="top-actions">
      <button class="icon-btn" data-act="langPicker" title="Dil">🌐</button>
      <button class="icon-btn" data-act="openDict" title="Sözlük">📖</button>
      <button class="icon-btn" data-act="goSettings" title="Ayarlar">⚙️</button>
      <button class="icon-btn" data-act="goHome" title="Ana Sayfa">🏠</button>
    </div>
  </header>
  <div id="app"></div>
  <footer>Her gün 10 dakika. Adım adım, seviye seviye. 💛<br><span style="font-size:12px;">Annem için sevgiyle yapıldı.</span></footer>
</div>
<div id="toast" class="toast"></div>

<script>
"use strict";

/* ===== İNGİLİZCE MÜFREDAT ===== */
const EN_LEVELS = [
{
  id:1, cefr:"A1", name:"Seviye 1 — Başlangıç", desc:"Sıfırdan başlayanlar için: temel kelimeler ve en basit gramer.",
  units:[
    {uid:"1-1", type:"vocab", icon:"👋", title:"Selamlaşma", desc:"Günlük selamlaşma ifadeleri.", words:[
      {en:"Hello", tr:"Merhaba", ex:"Hello, how are you?", exTr:"Merhaba, nasılsın?"},
      {en:"Good morning", tr:"Günaydın", ex:"Good morning, mom.", exTr:"Günaydın, anne."},
      {en:"Good evening", tr:"İyi akşamlar", ex:"Good evening!", exTr:"İyi akşamlar!"},
      {en:"Goodbye", tr:"Hoşça kal", ex:"Goodbye, see you.", exTr:"Hoşça kal, görüşürüz."},
      {en:"How are you?", tr:"Nasılsın?", ex:"Hello, how are you?", exTr:"Merhaba, nasılsın?"},
      {en:"I am fine", tr:"İyiyim", ex:"I am fine, thank you.", exTr:"İyiyim, teşekkürler."}
    ]},
    {uid:"1-2", type:"grammar", icon:"📖", title:"Gramer: am / is / are (olmak)",
      intro:"İngilizcede \"olmak\" fiili üç şekilde kullanılır: am, is, are. Türkçedeki \"-im, -sin, -dir\" eklerine benzer.",
      rule:"<b>I</b> ile <b>am</b>, <b>he/she/it</b> ile <b>is</b>, <b>you/we/they</b> ile <b>are</b> kullanılır. Örnek: \"I <b>am</b> happy\" = \"Mutlu<b>yum</b>\".",
      structure:[["Özne","Fiil","Örnek"],["I (ben)","am","I am a teacher (öğretmenim)"],["You (sen)","are","You are kind (nazikssin)"],["He/She/It (o)","is","She is happy (o mutlu)"],["We/They (biz/onlar)","are","We are home (evdeyiz)"]],
      examples:[{en:"I am Deniz.",tr:"Ben Deniz'im."},{en:"You are my friend.",tr:"Sen benim arkadaşımsın."},{en:"He is tall.",tr:"O uzun boylu."},{en:"We are ready.",tr:"Biz hazırız."},{en:"They are here.",tr:"Onlar burada."}],
      exercises:[
        {q:"I ___ happy.", options:["am","is","are"], answer:"am", explain:"I ile her zaman 'am' kullanılır."},
        {q:"She ___ a doctor.", options:["is","am","are"], answer:"is", explain:"He/She/It ile 'is' kullanılır."},
        {q:"They ___ my friends.", options:["are","is","am"], answer:"are", explain:"They ile 'are' kullanılır."},
        {q:"We ___ at home.", options:["are","is","am"], answer:"are", explain:"We ile 'are' kullanılır."},
        {q:"He ___ tired.", options:["is","are","am"], answer:"is", explain:"He ile 'is' kullanılır."}
      ]},
    {uid:"1-3", type:"vocab", icon:"🤝", title:"Tanışma", desc:"Kendini tanıtma cümleleri.", words:[
      {en:"My name is Deniz", tr:"Benim adım Deniz", ex:"Hello, my name is Deniz.", exTr:"Merhaba, benim adım Deniz."},
      {en:"What is your name?", tr:"Adın ne?", ex:"What is your name?", exTr:"Adın ne?"},
      {en:"Nice to meet you", tr:"Tanıştığımıza memnun oldum", ex:"Nice to meet you!", exTr:"Tanıştığımıza memnun oldum!"},
      {en:"I am from Turkey", tr:"Türkiye'denim", ex:"I am from Turkey.", exTr:"Türkiye'denim."},
      {en:"Thank you", tr:"Teşekkür ederim", ex:"Thank you very much.", exTr:"Çok teşekkür ederim."},
      {en:"You are welcome", tr:"Rica ederim", ex:"You are welcome.", exTr:"Rica ederim."}
    ]},
    {uid:"1-4", type:"grammar", icon:"📖", title:"Gramer: Çoğullar (-s)",
      intro:"Bir şeyden birden fazla olduğunda kelimenin sonuna genellikle -s eklenir.",
      rule:"Çoğul için sona <b>-s</b> ekle: cat → cat<b>s</b>. Kelime <b>-s, -x, -ch, -sh</b> ile bitiyorsa <b>-es</b> ekle: box → box<b>es</b>.",
      structure:[["Tekil","Çoğul"],["cat (kedi)","cats"],["book (kitap)","books"],["car (araba)","cars"],["box (kutu)","boxes"],["bus (otobüs)","buses"]],
      examples:[{en:"two cats",tr:"iki kedi"},{en:"three books",tr:"üç kitap"},{en:"five apples",tr:"beş elma"},{en:"many boxes",tr:"birçok kutu"}],
      exercises:[
        {q:"one car, two ___", options:["cars","car","cares"], answer:"cars", explain:"car → cars (sadece -s)."},
        {q:"one box, two ___", options:["boxes","boxs","box"], answer:"boxes", explain:"-x ile bitince -es: box → boxes."},
        {q:"I have three ___ (book).", options:["books","book","bookes"], answer:"books", explain:"book → books."},
        {q:"one bus, two ___", options:["buses","buss","bus"], answer:"buses", explain:"-s ile bitince -es: bus → buses."}
      ]},
    {uid:"1-5", type:"vocab", icon:"🔢", title:"Sayılar & Renkler", desc:"Temel sayılar ve renkler.", words:[
      {en:"One", tr:"Bir", ex:"I have one apple.", exTr:"Bir elmam var."},
      {en:"Two", tr:"İki", ex:"I have two cats.", exTr:"İki kedim var."},
      {en:"Three", tr:"Üç", ex:"Three books.", exTr:"Üç kitap."},
      {en:"Red", tr:"Kırmızı", ex:"The apple is red.", exTr:"Elma kırmızı."},
      {en:"Blue", tr:"Mavi", ex:"The sky is blue.", exTr:"Gökyüzü mavi."},
      {en:"Green", tr:"Yeşil", ex:"The grass is green.", exTr:"Çimen yeşil."}
    ]},
    {uid:"1-6", type:"grammar", icon:"📖", title:"Gramer: a / an",
      intro:"Tekil bir şeyden \"bir tane\" derken ismin önüne a veya an koyarız.",
      rule:"Kelime <b>sessiz harfle</b> başlıyorsa <b>a</b>: a book. Kelime <b>sesli harfle</b> (a, e, i, o, u) başlıyorsa <b>an</b>: an apple.",
      structure:[["a (sessiz)","an (sesli)"],["a car","an apple"],["a dog","an egg"],["a house","an orange"]],
      examples:[{en:"a book",tr:"bir kitap"},{en:"an apple",tr:"bir elma"},{en:"a dog",tr:"bir köpek"},{en:"an egg",tr:"bir yumurta"}],
      exercises:[
        {q:"___ apple", options:["an","a"], answer:"an", explain:"apple sesli harfle başlar → an."},
        {q:"___ book", options:["a","an"], answer:"a", explain:"book sessiz harfle başlar → a."},
        {q:"___ egg", options:["an","a"], answer:"an", explain:"egg sesli harfle başlar → an."},
        {q:"___ house", options:["a","an"], answer:"a", explain:"house sessiz (h) ile başlar → a."}
      ]},
    {uid:"1-7", type:"vocab", icon:"👨‍👩‍👧", title:"Aile & Ev", desc:"Aile bireyleri ve evdeki kelimeler.", words:[
      {en:"Mother", tr:"Anne", ex:"My mother is here.", exTr:"Annem burada."},
      {en:"Father", tr:"Baba", ex:"My father is at home.", exTr:"Babam evde."},
      {en:"Sister", tr:"Kız kardeş", ex:"This is my sister.", exTr:"Bu kız kardeşim."},
      {en:"Brother", tr:"Erkek kardeş", ex:"My brother is tall.", exTr:"Erkek kardeşim uzun."},
      {en:"House", tr:"Ev", ex:"This is my house.", exTr:"Bu benim evim."},
      {en:"Water", tr:"Su", ex:"I drink water.", exTr:"Su içerim."}
    ]},
    {uid:"1-8", type:"grammar", icon:"📖", title:"Gramer: this / that / these / those",
      intro:"Bir şeyi gösterirken yakın mı uzak mı, tekil mi çoğul mu olduğuna göre kelime değişir.",
      rule:"<b>this</b> = bu (yakın, tekil), <b>that</b> = şu/o (uzak, tekil), <b>these</b> = bunlar (yakın, çoğul), <b>those</b> = onlar (uzak, çoğul).",
      structure:[["","Tekil","Çoğul"],["Yakın","this","these"],["Uzak","that","those"]],
      examples:[{en:"This is my phone.",tr:"Bu benim telefonum."},{en:"That is your car.",tr:"Şu senin araban."},{en:"These are books.",tr:"Bunlar kitap."},{en:"Those are cats.",tr:"Onlar kedi."}],
      exercises:[
        {q:"___ is my book. (yakın, tekil)", options:["This","These","Those"], answer:"This", explain:"Yakın + tekil = this."},
        {q:"___ are my friends. (yakın, çoğul)", options:["These","This","That"], answer:"These", explain:"Yakın + çoğul = these."},
        {q:"___ is his house. (uzak, tekil)", options:["That","This","Those"], answer:"That", explain:"Uzak + tekil = that."},
        {q:"___ are her shoes. (uzak, çoğul)", options:["Those","These","That"], answer:"Those", explain:"Uzak + çoğul = those."}
      ]},
    {uid:"1-9", type:"vocab", icon:"💬", title:"Günlük Konuşma Kalıpları", desc:"Her gün işine yarayacak pratik kalıplar.", words:[
      {en:"See you later", tr:"Sonra görüşürüz", ex:"Bye! See you later.", exTr:"Hoşça kal! Sonra görüşürüz."},

/* ===== İNDEKSLEME ===== */
let ALL_UNITS = [];
let VOCAB_POOL = [];
let DICT = [];
function catForUnit(t){ if(/Selam|Tanış/.test(t)) return "Selamlaşma"; if(/Sayı|Renk/.test(t)) return "Sayılar & Renkler"; if(/Aile/.test(t)) return "Aile"; if(/Yiyecek/.test(t)) return "Yiyecek"; if(/Ev/.test(t)) return "Ev"; if(/Zaman/.test(t)) return "Zaman"; if(/Seyahat/.test(t)) return "Şehir"; return "Diğer"; }
function indexCurriculum(){
  ALL_UNITS = []; VOCAB_POOL = []; DICT = [];
  LEVELS.forEach(lv=>lv.units.forEach(u=>{ u._level=lv; ALL_UNITS.push(u); if(u.type==="vocab" && u.words) u.words.forEach(w=>VOCAB_POOL.push(w)); }));
  const seen=new Set();
  function add(w){ const k=w.en.toLowerCase(); if(seen.has(k)) return; seen.add(k); DICT.push(w); }
  LEVELS.forEach(lv=>lv.units.forEach(u=>{ if(u.type==="vocab" && u.words) u.words.forEach(w=>add({en:w.en,tr:w.tr,ex:w.ex,exTr:w.exTr,cat:catForUnit(u.title)})); }));
  DICTIONARY_EXTRA.forEach(add);
  DICT.sort((a,b)=>a.en.toLowerCase().localeCompare(b.en.toLowerCase(),"en"));
}
function findUnit(uid){ return ALL_UNITS.find(u=>u.uid===uid); }
function levelById(id){ return LEVELS.find(l=>l.id===id); }
function levelCompleted(lv){ return lv.units.every(u=>isDone(u.uid)); }
function levelDoneById(id){ const lv=levelById(id); return !!lv && levelCompleted(lv); }
function levelUnlocked(idx){
  if(idx<=0) return true;
  if(state.unlocks && state.unlocks[LEVELS[idx].id]) return true;
  return levelCompleted(LEVELS[idx-1]);
}

const STORE_KEY="dilOgren_v4";

function defaultLangData(){ return {completedLessons:[], wordsLearned:0, grammarLearned:0, reviewWords:[], bestScores:{}, unlocks:{}, dictLearned:[], earnedBadges:[], perfectQuiz:false}; }
function defaultState(){
  return Object.assign({}, defaultLangData(), {
    lang:null, langStore:{en:defaultLangData(), it:defaultLangData()},
    studyDates:[], streak:0, settings:{fontScale:1, rate:0.85, voiceURI:null}
  });
}
function loadState(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(raw){ const s=JSON.parse(raw); const d=defaultState(); const m=Object.assign(d,s);
      m.settings=Object.assign(defaultState().settings, s.settings||{});
      m.langStore=Object.assign({en:defaultLangData(), it:defaultLangData()}, s.langStore||{});
      return m; }
    // Eski sürümden (yalnızca İngilizce) göç
    const old=localStorage.getItem(OLD_KEY_V3);
    if(old){ const s=JSON.parse(old); const d=defaultState();
      d.langStore.en=Object.assign(defaultLangData(), {completedLessons:s.completedLessons||[], wordsLearned:s.wordsLearned||0, grammarLearned:s.grammarLearned||0, reviewWords:s.reviewWords||[], bestScores:s.bestScores||{}, unlocks:s.unlocks||{}, dictLearned:s.dictLearned||[], earnedBadges:s.earnedBadges||[], perfectQuiz:!!s.perfectQuiz});
      d.studyDates=s.studyDates||[]; d.streak=s.streak||0; if(s.settings) d.settings=Object.assign(d.settings, s.settings);
      d.lang="en"; return d; }
    return defaultState();
  }catch(e){ return defaultState(); }
}
function snapshotActive(){ return {completedLessons:state.completedLessons, wordsLearned:state.wordsLearned, grammarLearned:state.grammarLearned, reviewWords:state.reviewWords, bestScores:state.bestScores, unlocks:state.unlocks, dictLearned:state.dictLearned, earnedBadges:state.earnedBadges, perfectQuiz:state.perfectQuiz}; }
function applyLangData(o){ o=o||defaultLangData(); state.completedLessons=o.completedLessons||[]; state.wordsLearned=o.wordsLearned||0; state.grammarLearned=o.grammarLearned||0; state.reviewWords=o.reviewWords||[]; state.bestScores=o.bestScores||{}; state.unlocks=o.unlocks||{}; state.dictLearned=o.dictLearned||[]; state.earnedBadges=o.earnedBadges||[]; state.perfectQuiz=!!o.perfectQuiz; }
function saveState(){ try{ if(state.lang){ state.langStore[state.lang]=snapshotActive(); } localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){} }
function setLanguage(lang, opts){ opts=opts||{};

function dateKey(d){ d=d||new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function computeStreak(){ const set=new Set(state.studyDates); let s=0,cur=new Date();
  if(!set.has(dateKey(cur))) cur=addDays(cur,-1);
  while(set.has(dateKey(cur))){ s++; cur=addDays(cur,-1); } return s; }
function registerStudyToday(){ const t=dateKey(); if(!state.studyDates.includes(t)) state.studyDates.push(t);
  state.studyDates=state.studyDates.slice(-60); state.streak=computeStreak(); saveState(); }

function refreshVoices(){ if("speechSynthesis" in window){ VOICES=window.speechSynthesis.getVoices()||[]; } }
if("speechSynthesis" in window){ refreshVoices(); window.speechSynthesis.onvoiceschanged=refreshVoices; }
function langVoices(){ const p=SPEAK_LANG.slice(0,2); return VOICES.filter(v=>new RegExp("^"+p,"i").test(v.lang)); }
function pickVoice(){ const vs=langVoices();
  if(state.settings.voiceURI){ const v=vs.find(x=>x.voiceURI===state.settings.voiceURI); if(v) return v; }
  return vs.find(v=>v.lang && v.lang.replace("_","-").toLowerCase()===SPEAK_LANG.toLowerCase())||vs[0]||null; }
function speak(text){ if(!("speechSynthesis" in window)){ showToast("Bu cihazda sesli okuma yok."); return; }
  window.speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang=SPEAK_LANG; u.rate=state.settings.rate||0.85;
  const v=pickVoice(); if(v) u.voice=v; window.speechSynthesis.speak(u); }

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function sample(a,n){ return shuffle(a).slice(0,n); }
function distractors(field, answer, n){ const seen=new Set([answer]); const out=[];
  for(const w of shuffle(VOCAB_POOL)){ const v=w[field]; if(v && !seen.has(v)){ seen.add(v); out.push(v); if(out.length>=n) break; } } return out; }
function buildVocabQuiz(words, count){
  const n=count||Math.min(6,Math.max(4,words.length));
  const chosen=sample(words,Math.min(n,words.length)); while(chosen.length<n){ chosen.push(words[Math.floor(Math.random()*words.length)]); }
  const types=["en2tr","tr2en","listen"];
  return chosen.map(w=>{ const t=types[Math.floor(Math.random()*types.length)];
    if(t==="tr2en"){ const o=shuffle([w.en,...distractors("en",w.en,2)]); return {kind:"text",prompt:"\""+w.tr+"\" "+(state.lang==="it"?"İtalyancası":"İngilizcesi")+" nedir?",options:o,answer:w.en,explain:"\""+w.tr+"\" = \""+w.en+"\"."}; }
    if(t==="listen"){ const o=shuffle([w.tr,...distractors("tr",w.tr,2)]); return {kind:"listen",audio:w.en,prompt:"🔊 Dinle ve Türkçesini seç:",options:o,answer:w.tr,explain:"Duyduğun: \""+w.en+"\" = \""+w.tr+"\"."}; }
    const o=shuffle([w.tr,...distractors("tr",w.tr,2)]); return {kind:"text",prompt:"\""+w.en+"\" ne demek?",options:o,answer:w.tr,explain:"\""+w.en+"\" = \""+w.tr+"\"."};
  });
}
function buildGrammarQuiz(unit){ return unit.exercises.map(e=>({kind:"text",prompt:e.q,options:shuffle(e.options.slice()),answer:e.answer,explain:e.explain||""})); }
function buildLevelTest(lv){
  let qs=[];
  lv.units.forEach(u=>{
    if(u.type==="grammar"){ const g=buildGrammarQuiz(u); qs.push(g[Math.floor(Math.random()*g.length)]); }
    else if(u.words){ qs=qs.concat(buildVocabQuiz(u.words,2)); }
  });
  return shuffle(qs).slice(0, Math.min(10, qs.length));
}

function drawPractice(){ const u=ctx.unit, w=u.words[ctx.prIndex], n=u.words.length, mic=!!SR;
  app.innerHTML=`
    <div class="card center"><div class="counter">Telaffuz ${ctx.prIndex+1} / ${n}</div>
      <h2>${esc(w.en)}</h2><p class="word-tr">${esc(w.tr)}</p>
      <p class="muted">1) Dinle 2) Sen söyle 3) ${mic?"Mikrofona söyleyip kontrol et":"Tekrar dinle"}</p>
      <button class="btn btn-accent" data-act="speakPractice">🔊 Dinle</button>
      ${mic?`<button class="btn btn-primary" data-act="micCheck">🎤 Söyle ve Kontrol Et</button>`:`<button class="btn btn-primary" data-act="prNext">🗣️ Ben Söyledim, Devam</button>`}
      <div id="micState" class="mic-state ${mic?"":"hidden"}">Hazır olduğunda “Söyle ve Kontrol Et”e bas.</div></div>
    <div class="card"><button class="btn btn-soft" data-act="prNext">➡️ Sonraki Kelime</button>
      <button class="btn btn-soft" data-act="quizIntro" data-uid="${u.uid}" data-kind="vocab">📝 Mini Test</button>
      <button class="btn btn-soft" data-act="goHome">Ana Sayfa</button></div>`;
  window.scrollTo(0,0);
}
function prNext(){ if(ctx.prIndex<ctx.unit.words.length-1){ ctx.prIndex++; drawPractice(); } else { showToast("Harika pratik! 🎉"); renderQuizIntro(ctx.unit.uid,"vocab"); } }
function micCheck(){ if(!SR){ prNext(); return; } const w=ctx.unit.words[ctx.prIndex]; const box=document.getElementById("micState"); const target=normalize(w.en);
  const rec=new SR(); rec.lang=SPEAK_LANG; rec.interimResults=false; rec.maxAlternatives=5;
  box.className="mic-state listening"; box.innerHTML="🎤 <span class='pulse'>Dinliyorum... şimdi söyle</span>"; let done=false;
  rec.onresult=(e)=>{ done=true; const alts=[]; for(let i=0;i<e.results[0].length;i++) alts.push(normalize(e.results[0][i].transcript));
    const ok=alts.some(a=>a===target||a.includes(target)||target.includes(a));
    if(ok){ box.className="mic-state"; box.style.background="var(--good-bg)"; box.style.color="#1d7a42"; box.innerHTML="✓ Çok iyi! Doğru söyledin: <b>"+esc(w.en)+"</b>"; }
    else { box.className="mic-state"; box.style.background="var(--bad-bg)"; box.style.color="#a8312d"; box.innerHTML="Duyduğum: <b>"+esc(alts[0]||"-")+"</b><br>Hedef: <b>"+esc(w.en)+"</b> — dinleyip yavaşça tekrar dene. 💪"; } };
  rec.onerror=()=>{ if(!done){ box.className="mic-state"; box.textContent="Mikrofon çalışmadı. İzin ver veya “Ben söyledim” ile devam et."; } };
  rec.onend=()=>{ if(!done){ box.className="mic-state"; box.textContent="Sesini duyamadım. Tekrar dene. 🎤"; } };
  try{ rec.start(); }catch(e){ box.textContent="Mikrofon başlatılamadı."; } }

/* ----- TEST ----- */
function renderQuizIntro(uid,kind){ const u=findUnit(uid);
  app.innerHTML=`<div class="card center"><h2>📝 ${kind==="grammar"?"Alıştırma":"Mini Test"}</h2>
    <p>“${esc(u.title)}” için kısa sorular.</p><p class="muted">Korkma! Yanlışta açıklama gelir. Amaç öğrenmek. 💛</p>
    <button class="btn btn-primary" data-act="startQuiz" data-uid="${uid}" data-kind="${kind}">Başla</button>
    <button class="btn btn-soft" data-act="goHome">Ana Sayfa</button></div>`; window.scrollTo(0,0); }
function startQuiz(uid,kind){ const u=findUnit(uid);
  const questions = kind==="grammar" ? buildGrammarQuiz(u) : buildVocabQuiz(u.words);
  ctx={unit:u, mode:kind, questions, qIndex:0, correct:0, answered:false}; drawQuiz(); }
function startLevelTest(id){ const lv=levelById(id); ctx={unit:null, level:lv, mode:"leveltest", questions:buildLevelTest(lv), qIndex:0, correct:0, answered:false}; drawQuiz(); }
function startMixReview(){ let learned=[]; ALL_UNITS.forEach(u=>{ if(u.type==="vocab" && isDone(u.uid) && u.words) learned=learned.concat(u.words); });
  const pool=learned.length>=4?learned:VOCAB_POOL; ctx={unit:null, mode:"mix", questions:buildVocabQuiz(pool, Math.min(8,Math.max(5,pool.length))), qIndex:0, correct:0, answered:false}; drawQuiz(); }
function drawQuiz(){ const q=ctx.questions[ctx.qIndex], n=ctx.questions.length, pct=Math.round(ctx.qIndex/n*100);
  app.innerHTML=`<div class="card"><div class="counter">Soru ${ctx.qIndex+1} / ${n}</div>
    <div class="progressbar"><span style="width:${pct}%"></span></div><h3>${esc(q.prompt)}</h3>
    ${q.kind==="listen"?`<button class="btn btn-accent" data-act="replayAudio">🔊 Tekrar Dinle</button>`:""}
    <div id="opts" style="margin-top:10px;">${q.options.map((o,i)=>`<button class="opt" data-act="answer" data-i="${i}"><span>${esc(o)}</span></button>`).join("")}</div>
    <div id="qfeedback"></div><div id="qnext"></div></div>`;
  if(q.kind==="listen"){ setTimeout(()=>speak(q.audio),350); } window.scrollTo(0,0); }
function answerQuiz(i){ if(ctx.answered) return; ctx.answered=true; const q=ctx.questions[ctx.qIndex]; const correct=q.options[i]===q.answer;
  document.querySelectorAll("#opts .opt").forEach((b,idx)=>{ b.disabled=true; if(q.options[idx]===q.answer) b.classList.add("correct"); else if(idx===i) b.classList.add("wrong"); });
  if(correct) ctx.correct++; const fb=document.getElementById("qfeedback"); fb.className="feedback "+(correct?"good":"bad");
  fb.innerHTML=correct?"✓ Doğru! Aferin. 👏":"✗ Doğru cevap: <b>"+esc(q.answer)+"</b>."+(q.explain?"<br>"+esc(q.explain):"");
  const last=ctx.qIndex>=ctx.questions.length-1;
  document.getElementById("qnext").innerHTML=`<button class="btn btn-primary" data-act="nextQuiz">${last?"Bitir":"Sonraki Soru"}</button>`; }
function nextQuiz(){ if(ctx.qIndex<ctx.questions.length-1){ ctx.qIndex++; ctx.answered=false; drawQuiz(); } else finishQuiz(); }
function finishQuiz(){ const n=ctx.questions.length, score=ctx.correct, perfect=score===n; registerStudyToday();
  let firstTime=false; const u=ctx.unit;
  if((ctx.mode==="vocab"||ctx.mode==="grammar") && u){
    firstTime=!isDone(u.uid);
    if(firstTime){ state.completedLessons.push(u.uid); if(u.type==="vocab"&&u.words) state.wordsLearned+=u.words.length; if(u.type==="grammar") state.grammarLearned+=1; }
    const prev=state.bestScores[u.uid]; if(prev==null||score>prev) state.bestScores[u.uid]=score;
  }
  if(perfect) state.perfectQuiz=true; saveState(); const newly=checkBadges(); if(perfect||firstTime) confetti(); celebrate(newly);
  // sıradaki ünite önerisi
  let nextU=null;
  if(u){ const lv=u._level; const idx=lv.units.findIndex(x=>x.uid===u.uid); if(idx>=0 && idx<lv.units.length-1) nextU=lv.units[idx+1]; }
  const title = ctx.mode==="leveltest"?"🏁 Seviye Testi Bitti!":(ctx.mode==="mix"?"🔀 Karışık Tekrar Bitti!":"🎉 Üniteyi tamamladın!");
  let actions="";
  if(nextU) actions+=`<button class="btn btn-primary" data-act="openUnit" data-uid="${nextU.uid}">▶️ Sıradaki Ünite</button>`;
  if((ctx.mode==="vocab"||ctx.mode==="grammar")&&u) actions+=`<button class="btn btn-soft" data-act="startQuiz" data-uid="${u.uid}" data-kind="${ctx.mode}">🔁 Tekrar Çöz</button>`;
  actions+=`<button class="btn btn-soft" data-act="goHome">Ana Sayfa</button>`;
  app.innerHTML=`<div class="card center"><h2>${title}</h2>
    <p style="font-size:24px;font-weight:800;">${score} / ${n} doğru</p>
    <p class="muted">${perfect?"Mükemmel, hepsi doğru! 🌟":(score>=Math.ceil(n*0.6)?"Güzel iş! Biraz daha tekrarla harika olacak.":"Sorun değil — tekrar etmek öğrenmenin yoludur. 💛")}</p>
    ${state.streak>0?`<div class="streak-badge">🔥 ${state.streak} gün seri</div>`:""}</div>
    <div class="card">${actions}</div>`; window.scrollTo(0,0); }

/* ----- TEKRAR LİSTESİ ----- */
function renderReview(){ let html=`<div class="card"><h2>🔁 Tekrar Edilecek Kelimeler</h2>`;
  if(state.reviewWords.length===0){ html+=`<p class="empty">Liste boş. 👍<br>Kartlarda “Tekrar Et” dediğin kelimeler buraya gelir.</p>`; }
  else{ html+=`<p class="muted">Öğrendiğin kelimeyi “Öğrendim” ile çıkar.</p>`;
    html+=state.reviewWords.map((w,i)=>`<div class="review-item"><div class="word-main"><div class="word-en">${esc(w.en)}</div><div class="word-tr">${esc(w.tr)}</div></div>
      <button class="speak sm" data-act="speakReview" data-i="${i}">🔊</button>
      <button class="btn-soft" style="border:none;border-radius:12px;padding:10px 12px;cursor:pointer;font-size:15px;" data-act="learned" data-en="${esc(w.en)}">✓ Öğrendim</button></div>`).join("");
    html+=`<button class="btn btn-accent" data-act="mixReview" style="margin-top:12px;">🔀 Bu kelimelerle test çöz</button>`; }
  html+=`<button class="btn btn-soft" style="margin-top:12px;" data-act="goHome">Ana Sayfa</button></div>`; app.innerHTML=html; window.scrollTo(0,0); }

/* ----- ROZETLER ----- */
function renderAchievements(){ app.innerHTML=`<div class="card"><h2>🏅 Rozetlerim</h2>
  <p class="muted">${state.earnedBadges.length} / ${BADGES.length} rozet kazandın.</p>
  <div class="badges">${BADGES.map(b=>{ const on=state.earnedBadges.includes(b.id); return `<div class="badge ${on?"on":""}"><div class="b-ico">${b.ico}</div><div class="b-name">${esc(b.name)}</div><div class="b-desc">${esc(b.desc)}</div></div>`; }).join("")}</div>
  <button class="btn btn-soft" style="margin-top:14px;" data-act="goHome">Ana Sayfa</button></div>`; window.scrollTo(0,0); }

/* ----- DİL SEÇİMİ ----- */
function renderLangPicker(){
  app.innerHTML=`<div class="card center">
    <h2>🌐 Hangi dili çalışacaksın?</h2>
    <p class="muted">İstediğin an üstteki 🌐 düğmesinden değiştirebilirsin. İlerlemen her dil için ayrı tutulur.</p>
    <button class="btn btn-primary" data-act="chooseLang" data-lang="en">🇬🇧 İngilizce</button>
    <button class="btn btn-accent" data-act="chooseLang" data-lang="it">🇮🇹 İtalyanca</button>
    ${state.lang?`<button class="btn btn-soft" data-act="goHome">Vazgeç</button>`:""}
  </div>`;
  window.scrollTo(0,0);
}

/* ----- AYARLAR ----- */
function renderSettings(){ const fs=state.settings.fontScale, rt=state.settings.rate, env=langVoices();
  app.innerHTML=`<div class="card"><h2>⚙️ Ayarlar</h2>
    <label class="set-lbl">Yazı Boyutu</label>
    <div class="seg"><button data-act="setFont" data-v="1" class="${fs===1?"active":""}">Normal</button>
      <button data-act="setFont" data-v="1.15" class="${fs===1.15?"active":""}">Büyük</button>
      <button data-act="setFont" data-v="1.3" class="${fs===1.3?"active":""}">Çok Büyük</button></div>
    <label class="set-lbl">Okuma Hızı</label>
    <div class="seg"><button data-act="setRate" data-v="0.7" class="${rt===0.7?"active":""}">Çok Yavaş</button>
      <button data-act="setRate" data-v="0.85" class="${rt===0.85?"active":""}">Yavaş</button>
      <button data-act="setRate" data-v="1" class="${rt===1?"active":""}">Normal</button></div>
    <label class="set-lbl">${esc(LANGS[state.lang].name)} Sesi</label>
    ${env.length?`<div class="seg" style="flex-direction:column;">${env.slice(0,6).map(v=>`<button data-act="setVoice" data-uri="${esc(v.voiceURI)}" class="${state.settings.voiceURI===v.voiceURI?"active":""}">${esc(v.name)}</button>`).join("")}</div>`:`<p class="muted">Bu dil için ses bulunamadı; varsayılan kullanılacak.</p>`}
    <button class="btn btn-accent" data-act="testVoice">🔊 Sesi Dene</button>
    <hr style="border:none;border-top:1px solid var(--line);margin:18px 0;">
    <label class="set-lbl" style="color:var(--bad);">İlerlemeyi Sıfırla</label>
    <p class="muted">Tüm ilerleme, rozet ve tekrar listesi silinir. Geri alınamaz.</p>
    <button class="btn btn-ghost" data-act="resetAll" style="color:var(--bad);border-color:var(--bad);">Her şeyi sıfırla</button>
    <button class="btn btn-soft" style="margin-top:14px;" data-act="goHome">Ana Sayfa</button></div>`; window.scrollTo(0,0); }

/* ===== SÖZLÜK ===== */
const DICT_CATS=["Selamlaşma","Sayılar & Renkler","Aile","Vücut","Hayvanlar","Doğa & Hava","Yiyecek","Ev","Zaman","Fiiller","Sıfatlar","Şehir","Diğer"];
let dictState={q:"", cat:"Tümü"};
function dictFind(en){ return DICT.find(x=>x.en===en); }
function dictFiltered(){ let a=DICT.slice();
  if(dictState.cat!=="Tümü") a=a.filter(w=>w.cat===dictState.cat);
  const q=dictState.q.trim().toLowerCase();
  if(q) a=a.filter(w=>w.en.toLowerCase().includes(q)||w.tr.toLowerCase().includes(q));
  return a; }
function dictListHtml(){ const a=dictFiltered();
  if(!a.length) return `<p class="empty">Kelime bulunamadı. Aramayı veya kategoriyi değiştir.</p>`;
  return a.map(w=>{ const L=state.dictLearned.includes(w.en);
    return `<div class="review-item">
      <div class="word-main"><div class="word-en">${esc(w.en)}${L?" <span style='color:var(--good)'>✓</span>":""}</div>
        <div class="word-tr">${esc(w.tr)}</div>${w.ex?`<div class="word-ex">“${esc(w.ex)}” — ${esc(w.exTr)}</div>`:""}</div>
      <button class="speak sm" data-act="dictSpeak" data-en="${esc(w.en)}" title="Dinle">🔊</button>
      <button class="icon-btn" data-act="dictLearned" data-en="${esc(w.en)}" title="Öğrendim">${L?"↩️":"✓"}</button>
      <button class="icon-btn" data-act="dictAddReview" data-en="${esc(w.en)}" title="Tekrara ekle">🔁</button>
    </div>`; }).join(""); }
function updateDictList(){ const el=document.getElementById("dictList"); if(el) el.innerHTML=dictListHtml(); }
function renderDictionary(){
  const cats=["Tümü"].concat(DICT_CATS.filter(c=>DICT.some(w=>w.cat===c)));
  const chips=cats.map(c=>`<button data-act="dictCat" data-cat="${esc(c)}" class="${dictState.cat===c?"active":""}">${esc(c)}</button>`).join("");
  app.innerHTML=`<div class="card">
    <h2>📖 Sözlük</h2>
    <p class="muted">Test çözmeden de kelime öğrenebilirsin. Ara, 🔊 ile dinle, öğrendiklerini ✓ ile işaretle veya 🔁 ile tekrar listesine ekle.</p>
    <p class="muted">Toplam ${DICT.length} kelime · Öğrendiğin: ${state.dictLearned.length}</p>
    <input id="dictSearch" type="search" placeholder="🔍 Türkçe veya ${esc(LANGS[state.lang].name)} ara..." value="${esc(dictState.q)}" autocomplete="off"
      style="width:100%;padding:14px;font-size:18px;border:2px solid var(--line);border-radius:14px;margin:6px 0 12px;" />
    <div class="seg" style="overflow-x:auto;flex-wrap:nowrap;">${chips}</div>
    <div id="dictList">${dictListHtml()}</div>
    <button class="btn btn-soft" style="margin-top:12px;" data-act="goHome">Ana Sayfa</button>
  </div>`;
  window.scrollTo(0,0);
}

/* ===== OLAYLAR ===== */
document.addEventListener("click",(e)=>{ const el=e.target.closest("[data-act]"); if(!el) return; const a=el.dataset.act, d=el.dataset;
  switch(a){
    case "goHome": goHome(); break;
    case "goSettings": renderSettings(); break;
    case "langPicker": renderLangPicker(); break;
    case "chooseLang": setLanguage(d.lang); goHome(); break;
    case "openUnit": openUnit(d.uid); break;
    case "flash": renderFlash(d.uid); break;
    case "practice": renderPractice(d.uid); break;
    case "quizIntro": renderQuizIntro(d.uid, d.kind); break;
    case "startQuiz": startQuiz(d.uid, d.kind); break;
    case "levelTest": startLevelTest(+d.id); break;
    case "mixReview": startMixReview(); break;
    case "review": renderReview(); break;
    case "achievements": renderAchievements(); break;
    case "openDict": dictState={q:"",cat:"Tümü"}; renderDictionary(); break;
    case "dictCat": dictState.cat=d.cat; renderDictionary(); break;
    case "dictSpeak": { const w=dictFind(d.en); if(w) speak(w.ex||w.en); break; }
    case "dictAddReview": { const w=dictFind(d.en); if(w) addReviewWord(w); break; }
    case "dictLearned": { const i=state.dictLearned.indexOf(d.en); if(i>=0) state.dictLearned.splice(i,1); else { state.dictLearned.push(d.en); showToast("Öğrendin: "+d.en+" 👏"); } saveState(); renderDictionary(); break; }
    case "unlock": state.unlocks[+d.id]=true; saveState(); showToast("Seviye açıldı."); goHome(); break;
    case "reveal": { const box=document.getElementById("rev"+d.i); if(box){ const nowHidden=box.classList.toggle("hidden"); el.textContent = nowHidden ? "👁 Göster" : "🙈 Gizle"; } break; }
    case "speakUnitEx": speak(ctx.unit.words[+d.i].ex); break;
    case "speakExample": speak(ctx.unit.examples[+d.i].en); break;
    case "speakFlash": speak(ctx.unit.words[ctx.fcIndex].ex); break;
    case "speakPractice": speak(ctx.unit.words[ctx.prIndex].en); break;
    case "speakReview": speak(state.reviewWords[+d.i].en); break;
    case "replayAudio": speak(ctx.questions[ctx.qIndex].audio); break;
    case "flip": flipCard(); break;
    case "fcKnow": showToast("Aferin! 👏"); fcAdvance(); break;
    case "fcRepeat": addReviewWord(ctx.unit.words[ctx.fcIndex]); fcAdvance(); break;
    case "prNext": prNext(); break;
    case "micCheck": micCheck(); break;
    case "answer": answerQuiz(+d.i); break;
    case "nextQuiz": nextQuiz(); break;
    case "learned": removeReviewWord(d.en); showToast("Tebrikler! Öğrendin: "+d.en); renderReview(); break;
    case "setFont": state.settings.fontScale=+d.v; saveState(); applySettings(); renderSettings(); break;
    case "setRate": state.settings.rate=+d.v; saveState(); renderSettings(); break;
    case "setVoice": state.settings.voiceURI=d.uri; saveState(); renderSettings(); break;
    case "testVoice": speak(state.lang==="it"?"Ciao, buongiorno. Come stai? Sto imparando l'italiano.":"Hello, good morning. How are you? I am learning English."); break;
    case "resetAll": if(confirm("Tüm ilerleme silinsin mi? Geri alınamaz.")){ state=defaultState(); saveState(); applySettings(); showToast("Sıfırlandı."); goHome(); } break;
  }
});
document.addEventListener("input",(e)=>{ if(e.target && e.target.id==="dictSearch"){ dictState.q=e.target.value; updateDictList(); } });

/* ===== BAŞLAT ===== */
if(state.lang){ setLanguage(state.lang, {skipSaveOld:true}); }
else { LEVELS=LANGS.en.levels; DICTIONARY_EXTRA=LANGS.en.dictExtra; indexCurriculum(); }
state.streak=computeStreak(); saveState();
applySettings();
if(state.lang){ renderHome(); } else { renderLangPicker(); }
</script>
</body>
</html>
